general {
    disable_loading_bar = true
    hide_cursor = false
}

background {
    monitor =
    path = ~/Pictures/Wallpapers/current.png
    blur_passes = 3
    blur_size = 8
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    font_size = 90
    color = rgba(ffffffee)

    position = 0,120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %d %B %Y")"

    font_size = 25
    color = rgba(bbbbbbff)

    position = 0,40
    halign = center
    valign = center
}

input-field {
    monitor =

    size = 280,55

    outline_thickness = 2

    dots_size = 0.25

    dots_spacing = 0.20

    outer_color = rgb(33ccff)

    inner_color = rgb(1a1b26)

    font_color = rgb(ffffff)

    fade_on_empty = false

    placeholder_text = <i>Password...</i>

    position = 0,-120

    halign = center

    valign = center
}